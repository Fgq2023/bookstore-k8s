# k8s/base/networkpolicy-allow-frontend.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-from-backend
  namespace: bookstore
  labels:
    app.kubernetes.io/name: bookstore
    app.kubernetes.io/version: "1.0.0"
spec:
  podSelector:
    matchLabels:
      app: bookstore-frontend  # 应用于 frontend Pod
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: bookstore-backend  # 允许 backend Pod 访问
      ports:
        - protocol: TCP
          port: 80