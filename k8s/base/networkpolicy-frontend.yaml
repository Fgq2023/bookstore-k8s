apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-netpol
  namespace: bookstore
spec:
  podSelector:
    matchLabels:
      app: bookstore-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only accept traffic from the Ingress Controller (port 80)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
  egress:
    # Only allow egress to the backend service (port 80)
    - to:
        - podSelector:
            matchLabels:
              app: bookstore-backend
      ports:
        - protocol: TCP
          port: 80
