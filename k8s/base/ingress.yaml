apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookstore-ingress
  labels:
    app.kubernetes.io/name: bookstore
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: bookstore.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bookstore-frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: bookstore-backend
            port:
              number: 80
      - path: /healthz
        pathType: Exact
        backend:
          service:
            name: bookstore-backend
            port:
              number: 80
