apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-netpol
  namespace: bookstore
spec:
  podSelector:
    matchLabels:
      app: bookstore-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only accept traffic from the frontend pods (port 8000)
    - from:
        - podSelector:
            matchLabels:
              app: bookstore-frontend
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Only allow egress to the database (port 5432)
    - to:
        - podSelector:
            matchLabels:
              app: bookstore-db
      ports:
        - protocol: TCP
          port: 5432
