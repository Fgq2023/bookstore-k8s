# k8s/base/service-frontend.yaml - 修复版
apiVersion: v1
kind: Service
metadata:
  name: bookstore-frontend
  labels:
    app: bookstore-frontend
    app.kubernetes.io/name: bookstore
    app.kubernetes.io/version: "1.0.0"
spec:
  type: NodePort
  selector:
    app: bookstore-frontend  # ✅ 只保留这个，与 Pod 标签匹配
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP