apiVersion: v1
kind: ConfigMap
metadata:
  name: bookstore-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  bookstore.json: |-
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 10, "showPoints": "never"}, "unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "none"}},
          "targets": [
            {"expr": "rate(http_requests_total{job=\"bookstore-backend\"}[1m])", "legendFormat": "{{method}} {{path}}", "refId": "A"}
          ],
          "title": "HTTP Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 10, "showPoints": "never"}, "unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "none"}},
          "targets": [
            {"expr": "rate(http_request_duration_seconds{job=\"bookstore-backend\"}[1m])", "legendFormat": "{{method}} {{path}}", "refId": "A"}
          ],
          "title": "Request Duration",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 10, "showPoints": "never"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "none"}},
          "targets": [
            {"expr": "db_connections_success_total{job=\"bookstore-backend\"}", "legendFormat": "success", "refId": "A"},
            {"expr": "db_connections_failed_total{job=\"bookstore-backend\"}", "legendFormat": "failed", "refId": "B"}
          ],
          "title": "DB Connections",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 10, "showPoints": "never"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "none"}},
          "targets": [
            {"expr": "orders_created_total{job=\"bookstore-backend\"}", "legendFormat": "orders", "refId": "A"},
            {"expr": "cart_items_added_total{job=\"bookstore-backend\"}", "legendFormat": "cart items", "refId": "B"}
          ],
          "title": "Business Metrics",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 10, "showPoints": "never"}, "unit": "conn"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 5,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "none"}},
          "targets": [
            {"expr": "db_pool_used_connections{job=\"bookstore-backend\"}", "legendFormat": "used", "refId": "A"},
            {"expr": "db_pool_free_connections{job=\"bookstore-backend\"}", "legendFormat": "free", "refId": "B"}
          ],
          "title": "DB Connection Pool",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 10, "showPoints": "never"}, "unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 6,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "none"}},
          "targets": [
            {"expr": "db_pool_used_connections{job=\"bookstore-backend\"} / (db_pool_used_connections{job=\"bookstore-backend\"} + db_pool_free_connections{job=\"bookstore-backend\"})", "legendFormat": "utilization", "refId": "A"}
          ],
          "title": "DB Pool Utilization",
          "type": "timeseries"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["bookstore"],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Cloud-Native Bookstore",
      "uid": "bookstore-dashboard",
      "version": 2,
      "weekStart": ""
    }
