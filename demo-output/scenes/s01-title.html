<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: white;
  overflow: hidden;
}
.k8s-logo {
  width: 120px;
  height: 120px;
  margin-bottom: 40px;
  opacity: 0.9;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.title {
  font-size: 64px;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 20px;
  text-align: center;
  background: linear-gradient(90deg, #fff 0%, #74b9ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size: 28px;
  color: #a0a0a0;
  font-weight: 300;
  margin-bottom: 60px;
}
.divider {
  width: 200px;
  height: 3px;
  background: linear-gradient(90deg, transparent, #3498db, transparent);
  margin-bottom: 40px;
}
.meta {
  font-size: 20px;
  color: #6c7a89;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.badges {
  display: flex;
  gap: 20px;
  margin-top: 50px;
}
.badge {
  padding: 10px 24px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 30px;
  font-size: 16px;
  color: #bdc3c7;
  background: rgba(255,255,255,0.05);
}
</style>
</head>
<body>
<svg class="k8s-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M16 2L4 8v16l12 6 12-6V8L16 2z" fill="#326CE5"/>
  <path d="M16 6l-8 4v10l8 4 8-4V10l-8-4z" fill="#fff" opacity="0.9"/>
  <circle cx="16" cy="16" r="3" fill="#326CE5"/>
</svg>
<div class="title">Cloud-Native Online Bookstore</div>
<div class="subtitle">Built on Kubernetes | Microservices Architecture</div>
<div class="divider"></div>
<div class="meta">DSAA4040 Engineering Track | Group 5 | May 2026</div>
<div class="badges">
  <div class="badge">Vue 3</div>
  <div class="badge">Flask</div>
  <div class="badge">PostgreSQL</div>
  <div class="badge">Redis</div>
  <div class="badge">Kubernetes</div>
</div>
</body>
</html>
