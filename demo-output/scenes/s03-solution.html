<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: white;
  overflow: hidden;
}
.title {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 60px;
  text-align: center;
}
.architecture {
  display: flex;
  align-items: center;
  gap: 40px;
  margin-bottom: 60px;
}
.layer {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.box {
  width: 220px;
  padding: 24px;
  border-radius: 12px;
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  animation: glow 2s ease-in-out infinite alternate;
}
@keyframes glow {
  from { box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  to { box-shadow: 0 8px 40px rgba(52, 152, 219, 0.3); }
}
.frontend { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.backend { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
.database { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #0f2027; }
.cache { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #0f2027; }
.monitor { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #0f2027; }
.arrow {
  font-size: 40px;
  color: #74b9ff;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}
.features {
  display: flex;
  gap: 30px;
  margin-top: 20px;
}
.feature-tag {
  padding: 12px 28px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 30px;
  font-size: 18px;
  color: #74b9ff;
}
.subtitle {
  font-size: 24px;
  color: #95a5a6;
  margin-top: 30px;
}
</style>
</head>
<body>
<div class="title">Cloud-Native Architecture</div>
<div class="architecture">
  <div class="layer">
    <div class="box frontend">Vue 3 + nginx<br><span style="font-size: 14px; opacity: 0.8;">Frontend</span></div>
  </div>
  <div class="arrow">→</div>
  <div class="layer">
    <div class="box backend">Flask + Gunicorn<br><span style="font-size: 14px; opacity: 0.8;">Backend API</span></div>
  </div>
  <div class="arrow">→</div>
  <div class="layer">
    <div class="box database">PostgreSQL 15<br><span style="font-size: 14px; opacity: 0.8;">Database</span></div>
    <div class="box cache">Redis 7<br><span style="font-size: 14px; opacity: 0.8;">Cache</span></div>
  </div>
  <div class="arrow">↔</div>
  <div class="layer">
    <div class="box monitor">Prometheus +<br>Grafana<br><span style="font-size: 14px; opacity: 0.8;">Observability</span></div>
  </div>
</div>
<div class="features">
  <div class="feature-tag">Auto-scaling</div>
  <div class="feature-tag">Zero-trust Network</div>
  <div class="feature-tag">Health Probes</div>
  <div class="feature-tag">Graceful Shutdown</div>
</div>
<div class="subtitle">Kubernetes Orchestrated | Microservices | Production-Ready</div>
</body>
</html>
