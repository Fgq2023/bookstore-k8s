<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  background: #111827;
  display: flex;
  flex-direction: column;
  padding: 60px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: white;
  overflow: hidden;
}
.header {
  font-size: 36px;
  font-weight: 700;
  color: #fbbf24;
  margin-bottom: 30px;
}
.dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 24px;
  flex: 1;
}
.panel {
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 12px;
  padding: 24px;
  display: flex;
  flex-direction: column;
}
.panel-title {
  font-size: 16px;
  color: #9ca3af;
  margin-bottom: 16px;
  font-weight: 500;
}
.chart {
  flex: 1;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 0;
}
.bar {
  flex: 1;
  background: linear-gradient(to top, #3b82f6, #60a5fa);
  border-radius: 4px 4px 0 0;
  min-height: 20px;
  animation: grow 1s ease forwards;
  transform-origin: bottom;
  transform: scaleY(0);
}
.bar:nth-child(1) { height: 40%; animation-delay: 0.1s; }
.bar:nth-child(2) { height: 65%; animation-delay: 0.2s; }
.bar:nth-child(3) { height: 45%; animation-delay: 0.3s; }
.bar:nth-child(4) { height: 80%; animation-delay: 0.4s; }
.bar:nth-child(5) { height: 55%; animation-delay: 0.5s; }
.bar:nth-child(6) { height: 90%; animation-delay: 0.6s; }
.bar:nth-child(7) { height: 70%; animation-delay: 0.7s; }
.bar:nth-child(8) { height: 85%; animation-delay: 0.8s; }
.bar.alert { background: linear-gradient(to top, #ef4444, #f87171); }
.bar.success { background: linear-gradient(to top, #10b981, #34d399); }

@keyframes grow {
  to { transform: scaleY(1); }
}
.gauge-container {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
}
.gauge {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 12px solid #374151;
  border-top-color: #10b981;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 700;
  color: #10b981;
  transform: rotate(-45deg);
}
.gauge span { transform: rotate(45deg); }
.stat-value {
  font-size: 42px;
  font-weight: 700;
  color: #3b82f6;
  text-align: center;
  margin-top: 20px;
}
.stat-label {
  font-size: 14px;
  color: #9ca3af;
  text-align: center;
  margin-top: 5px;
}
</style>
</head>
<body>
<div class="header">Grafana Monitoring Dashboard</div>
<div class="dashboard">
  <div class="panel">
    <div class="panel-title">HTTP Request Rate (req/s)</div>
    <div class="chart">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar alert"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">P95 Latency (ms)</div>
    <div class="chart">
      <div class="bar success" style="height: 30%"></div>
      <div class="bar success" style="height: 35%"></div>
      <div class="bar success" style="height: 28%"></div>
      <div class="bar success" style="height: 32%"></div>
      <div class="bar success" style="height: 30%"></div>
      <div class="bar success" style="height: 31%"></div>
      <div class="bar success" style="height: 29%"></div>
      <div class="bar success" style="height: 30%"></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">DB Connections</div>
    <div class="gauge-container">
      <div class="gauge"><span>12</span></div>
    </div>
    <div class="stat-label">Active Connections</div>
  </div>
  <div class="panel">
    <div class="panel-title">DB Pool Utilization</div>
    <div class="gauge-container">
      <div class="gauge" style="border-top-color: #f59e0b; color: #f59e0b;"><span>65%</span></div>
    </div>
    <div class="stat-label">Used / Free: 13 / 7</div>
  </div>
  <div class="panel">
    <div class="panel-title">Orders Created</div>
    <div class="stat-value">1,247</div>
    <div class="stat-label">Total orders today</div>
  </div>
  <div class="panel">
    <div class="panel-title">Cart Items Added</div>
    <div class="stat-value">3,892</div>
    <div class="stat-label">Total items today</div>
  </div>
</div>
</body>
</html>
