server {
    listen 0.0.0.0:80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # ✅ 健康检查端点
    location = /healthz {
        access_log off;
        add_header Content-Type application/json;
        add_header Cache-Control "no-cache";
        return 200 "{\"status\":\"healthy\",\"service\":\"frontend\"}";
    }
}
