name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile (backend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: src/backend/Dockerfile
          failure-threshold: warning

      - name: Lint Dockerfile (frontend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: src/frontend/Dockerfile
          failure-threshold: warning

      - name: Lint Kubernetes manifests
        run: |
          wget -q https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform-linux-amd64.tar.gz
          ./kubeconform -strict -ignore-missing-schemas k8s/base/ k8s/overlays/minikube/ || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r src/backend/requirements.txt

      - name: Run pytest
        run: |
          cd src/backend && pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: src/backend/coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          push: false
          tags: bookstore-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: false
          tags: bookstore-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend for scan
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          push: false
          load: true
          tags: bookstore-backend:scan
          cache-from: type=gha

      - name: Build frontend for scan
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: false
          load: true
          tags: bookstore-frontend:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner (backend)
        uses: aquasecurity/trivy-action@v0.21.0
        with:
          image-ref: bookstore-backend:scan
          format: sarif
          output: trivy-backend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Run Trivy vulnerability scanner (frontend)
        uses: aquasecurity/trivy-action@v0.21.0
        with:
          image-ref: bookstore-frontend:scan
          format: sarif
          output: trivy-frontend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload backend scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: trivy-backend-results.sarif
          category: trivy-backend

      - name: Upload frontend scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: trivy-frontend-results.sarif
          category: trivy-frontend

      - name: Display scan summary
        run: |
          echo "=== Backend Scan ==="
          cat trivy-backend-results.sarif | jq '.runs[0].results | length' || echo "N/A"
          echo "=== Frontend Scan ==="
          cat trivy-frontend-results.sarif | jq '.runs[0].results | length' || echo "N/A"

  deploy-check:
    name: Kustomize Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Kustomize
        run: |
          wget -q https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz
          tar -xzf kustomize_v5.3.0_linux_amd64.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Kustomize build overlay
        run: |
          kustomize build k8s/overlays/minikube > manifest.yaml
          echo "✅ Kustomize build successful"
          wc -l manifest.yaml
